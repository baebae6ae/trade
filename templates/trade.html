{% extends "base.html" %}
{% block title %}내 거래 관리{% endblock %}

{% block content %}
<div class="container-fluid">

    <!-- 포트폴리오 요약 + 종목 검색 -->
    <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center py-2">
            <span><i class="bi bi-briefcase me-2"></i><strong>내 포트폴리오</strong></span>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-info btn-sm" onclick="refreshAllPrices()" title="모든 종목 현재가 새로고침">
                    <i class="bi bi-arrow-clockwise me-1"></i>가격 새로고침
                </button>
                <span class="badge bg-info" id="portfolioSummaryBadge">0개 보유</span>
            </div>
        </div>
        <div class="card-body p-0">
            <table class="table table-sm table-dark table-hover mb-0">
                <thead>
                    <tr class="table-secondary small">
                        <th>종목</th><th>방향</th><th>수량</th><th>평균단가</th><th>현재가</th><th>수익률</th><th>손절가</th>
                    </tr>
                </thead>
                <tbody id="portfolioTableBody">
                    <tr><td class="text-muted" colspan="7">보유 중인 종목이 없습니다. 아래에서 새 포지션을 등록하세요.</td></tr>
                </tbody>
                <tfoot id="portfolioTotalRow" style="display:none;">
                    <tr class="table-dark border-top fw-bold">
                        <td colspan="5" class="text-end">전체 합계</td>
                        <td id="totalPnl">--</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="row g-3">
        <!-- 왼쪽: 차트 -->
        <div class="col-lg-8">
            <!-- 종목 정보 바 -->
            <div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-dark rounded" id="tickerBar" style="display:none;">
                <div>
                    <span class="fw-bold fs-5" id="tickerSymbolDisplay">--</span>
                    <span class="text-muted ms-2" id="tickerNameDisplay"></span>
                </div>
                <div>
                    <span class="fs-5 fw-bold me-2" id="currentPriceDisplay">--</span>
                    <span class="badge bg-secondary ms-1" id="chartAtr">ATR: --</span>
                </div>
            </div>
            <div class="card mb-3">
                <div class="card-body p-2">
                    <canvas id="priceChart" height="350"></canvas>
                </div>
            </div>

            <!-- 매매 가이드 (선택된 종목) -->
            <div id="tradeGuidePanel" class="card mb-3" style="display:none;">
                <div class="card-header py-2">
                    <i class="bi bi-signpost-2 me-2"></i><strong id="guideSymbolTitle">매매 가이드</strong>
                </div>
                <div class="card-body py-2" id="tradeGuideContent"></div>
            </div>
        </div>

        <!-- 오른쪽: 입력 & 상세 -->
        <div class="col-lg-4">

            <!-- 종목 검색 -->
            <div class="card mb-3">
                <div class="card-header py-2">
                    <i class="bi bi-search me-2"></i>종목 검색
                </div>
                <div class="card-body py-2">
                    <div class="input-group input-group-sm">
                        <input type="text" class="form-control" id="tickerSearch"
                               placeholder="종목명 또는 코드 (삼성전자, AAPL)" autocomplete="off">
                        <button class="btn btn-primary" onclick="searchTicker()" id="btnSearch">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                    <div id="searchResults" class="position-relative">
                        <div id="searchDropdown" class="dropdown-menu w-100" style="display:none; max-height:250px; overflow-y:auto; background-color:#1a1a1a; border:1px solid #444;"></div>
                    </div>
                    <div id="tickerInfo" class="small text-muted mt-1">종목을 검색하면 차트와 ATR이 자동으로 로드됩니다</div>
                </div>
            </div>

            <!-- 새 포지션 등록 -->
            <div class="card mb-3">
                <div class="card-header py-2">
                    <i class="bi bi-plus-circle me-2"></i>포지션 등록
                </div>
                <div class="card-body">
                    <div class="row g-2 mb-2">
                        <div class="col-12">
                            <input type="text" class="form-control form-control-sm" id="entrySymbol" placeholder="종목 코드 (예: AAPL, 005930.KS)">
                        </div>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <label class="form-label small mb-0">매수일</label>
                            <input type="date" class="form-control form-control-sm" id="entryDate">
                        </div>
                        <div class="col-6">
                            <label class="form-label small mb-0">방향</label>
                            <select class="form-select form-select-sm" id="entryDirection">
                                <option value="long">매수 (롱)</option>
                                <option value="short">공매도 (숏)</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <label class="form-label small mb-0">매수 가격</label>
                            <input type="number" step="any" class="form-control form-control-sm" id="entryPrice" placeholder="50000">
                        </div>
                        <div class="col-6">
                            <label class="form-label small mb-0">수량</label>
                            <input type="number" step="any" class="form-control form-control-sm" id="entryQty" value="0" placeholder="100">
                        </div>
                    </div>
                    <button class="btn btn-success btn-sm w-100" onclick="manualEntry()">
                        <i class="bi bi-check-circle me-1"></i>포지션 등록
                    </button>
                </div>
            </div>

            <!-- 선택 종목 상세 (포지션이 있을 때) -->
            <div id="positionDetailCard" class="card mb-3" style="display:none;">
                <div class="card-header py-2 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-bar-chart me-2"></i><strong id="detailSymbolTitle">상세</strong></span>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-danger btn-sm" onclick="closeSelectedPosition()" title="매도(청산)">
                            <i class="bi bi-x-circle me-1"></i>매도
                        </button>
                        <button class="btn btn-outline-warning btn-sm" onclick="resetSelectedPosition()" title="리셋">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </button>
                    </div>
                </div>
                <div class="card-body p-2" id="positionDetailContent"></div>
            </div>

            <!-- 추가 매수 (포지션이 있을 때) -->
            <div id="addEntryCard" class="card mb-3" style="display:none;">
                <div class="card-header py-2">
                    <i class="bi bi-cart-plus me-2"></i>추가 매수
                </div>
                <div class="card-body">
                    <div class="row g-2 mb-2">
                        <div class="col-4">
                            <label class="form-label small mb-0">날짜</label>
                            <input type="date" class="form-control form-control-sm" id="addDate">
                        </div>
                        <div class="col-4">
                            <label class="form-label small mb-0">가격</label>
                            <input type="number" step="any" class="form-control form-control-sm" id="addPrice" placeholder="48000" onchange="updateAddTypeExpl()">
                        </div>
                        <div class="col-4">
                            <label class="form-label small mb-0">수량</label>
                            <input type="number" step="any" class="form-control form-control-sm" id="addQty" placeholder="100">
                        </div>
                    </div>
                    <div class="mb-2">
                        <select class="form-select form-select-sm" id="addType" onchange="updateAddTypeExpl()">
                            <option value="pyramid">피라미딩 (수익 방향 추가 매수)</option>
                            <option value="avg_down">물타기 (손실 방향 추가 매수)</option>
                        </select>
                        <div id="typeExpl" class="form-text small mt-1"></div>
                    </div>
                    <button class="btn btn-info btn-sm w-100" onclick="manualAdd()">
                        <i class="bi bi-plus me-1"></i>추가 매수 기록
                    </button>
                </div>
            </div>

            <!-- 매도 가격 입력 -->
            <div id="closeCard" class="card mb-3" style="display:none;">
                <div class="card-header py-2">
                    <i class="bi bi-cash-stack me-2"></i>매도 (청산)
                </div>
                <div class="card-body">
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <label class="form-label small mb-0">매도 가격 (0이면 현재가)</label>
                            <input type="number" step="any" class="form-control form-control-sm" id="closePrice" value="0" placeholder="55000">
                        </div>
                        <div class="col-6">
                            <label class="form-label small mb-0">매도 수량 (0이면 전부)</label>
                            <input type="number" step="any" class="form-control form-control-sm" id="closeQty" value="0" placeholder="전량 매도">
                        </div>
                    </div>
                    <button class="btn btn-danger btn-sm w-100" onclick="manualClose()">
                        <i class="bi bi-x-circle me-1"></i>매도 실행
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let priceChart = null;
let currentSymbol = '';
let selectedPositionSymbol = '';
let searchTimeout = null;
let lastChartJson = '';

// ── 종목 검색 ───────────────────────────────────────────

document.getElementById('tickerSearch').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const q = this.value.trim();
    if (q.length < 1) {
        document.getElementById('searchDropdown').style.display = 'none';
        return;
    }
    searchTimeout = setTimeout(() => searchTicker(), 300);
});

document.getElementById('tickerSearch').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); searchTicker(); }
});

document.addEventListener('click', function(e) {
    if (!e.target.closest('#searchResults') && !e.target.closest('#tickerSearch')) {
        document.getElementById('searchDropdown').style.display = 'none';
    }
});

async function searchTicker() {
    const q = document.getElementById('tickerSearch').value.trim();
    if (!q) return;
    document.getElementById('btnSearch').innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    try {
        const res = await fetch(`/api/ticker/search?q=${encodeURIComponent(q)}`);
        const results = await res.json();
        const dropdown = document.getElementById('searchDropdown');
        if (!results.length || results[0]?.error) {
            dropdown.innerHTML = '<div class="dropdown-item text-muted">검색 결과 없음</div>';
            dropdown.style.display = 'block';
            return;
        }
        dropdown.innerHTML = results.map(r => `
            <a class="dropdown-item d-flex justify-content-between" href="#"
               onclick="selectTicker('${r.symbol}', '${(r.name || '').replace(/'/g, "\\'")}'); return false;">
                <div><strong>${r.symbol}</strong> <span class="text-muted ms-2">${r.name || ''}</span></div>
                <small class="text-muted">${r.exchange || ''}</small>
            </a>
        `).join('');
        dropdown.style.display = 'block';
    } catch (err) { console.error(err); }
    finally { document.getElementById('btnSearch').innerHTML = '<i class="bi bi-search"></i>'; }
}

async function selectTicker(symbol, name) {
    document.getElementById('searchDropdown').style.display = 'none';
    document.getElementById('tickerSearch').value = symbol;
    document.getElementById('entrySymbol').value = symbol;
    document.getElementById('tickerInfo').innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>차트 로딩 중...';

    try {
        const res = await fetchJson('/api/ticker/set', { symbol, interval: '1d', count: 200 });
        if (res.error) {
            showToast('오류', res.error, 'danger');
            document.getElementById('tickerInfo').textContent = res.error;
            return;
        }
        currentSymbol = symbol;
        lastChartJson = '';

        document.getElementById('tickerBar').style.display = 'flex';
        document.getElementById('tickerBar').classList.add('d-flex');
        document.getElementById('tickerSymbolDisplay').textContent = symbol;
        document.getElementById('tickerNameDisplay').textContent = res.name || '';
        document.getElementById('currentPriceDisplay').textContent = res.last_price?.toLocaleString() || '--';
        document.getElementById('tickerInfo').innerHTML =
            `<span class="text-success"><i class="bi bi-check-circle me-1"></i>${res.name} | ATR: ${res.atr?.toFixed(2)}</span>`;

        // 이 종목에 포지션이 있으면 자동 선택
        selectedPositionSymbol = symbol;
        loadAll();
    } catch (err) {
        document.getElementById('tickerInfo').textContent = '로드 실패';
    }
}

// ── 데이터 로드 ──────────────────────────────────────────

async function loadAll() {
    try {
        const [statusRes, posRes] = await Promise.all([
            fetch('/api/status').then(r => r.json()),
            fetch('/api/positions').then(r => r.json()),
        ]);
        renderPortfolio(posRes);
        updateChart();
        updateNavbar(statusRes, posRes);

        // 종목 정보 복원
        if (statusRes.config?.ticker_symbol && !currentSymbol) {
            currentSymbol = statusRes.config.ticker_symbol;
            document.getElementById('tickerSearch').value = currentSymbol;
            document.getElementById('tickerSymbolDisplay').textContent = currentSymbol;
            document.getElementById('tickerNameDisplay').textContent = statusRes.config.ticker_name || '';
            if (statusRes.bar_count > 0) {
                document.getElementById('tickerBar').style.display = 'flex';
                document.getElementById('tickerBar').classList.add('d-flex');
            }
        }
        if (statusRes.config?.position_direction) {
            document.getElementById('entryDirection').value = statusRes.config.position_direction;
        }
        document.getElementById('chartAtr').textContent = `ATR: ${statusRes.atr > 0 ? statusRes.atr.toFixed(2) : '--'}`;
    } catch (err) { console.error(err); }
}

function updateNavbar(status, posData) {
    const navEl = document.getElementById('navStatus');
    if (posData.count > 0) {
        navEl.textContent = `${posData.count}개 보유`;
        navEl.className = 'badge bg-info';
    } else {
        navEl.textContent = '대기';
        navEl.className = 'badge bg-secondary';
    }
    document.getElementById('navAtr').textContent = `ATR: ${status.atr > 0 ? status.atr.toFixed(4) : '--'}`;
}

// ── 포트폴리오 테이블 ────────────────────────────────────

function renderPortfolio(posData) {
    const positions = posData.positions || [];
    window._allPositions = positions;
    const tbody = document.getElementById('portfolioTableBody');
    const badge = document.getElementById('portfolioSummaryBadge');
    const totalRow = document.getElementById('portfolioTotalRow');

    if (positions.length === 0) {
        badge.textContent = '0개 보유';
        tbody.innerHTML = '<tr><td class="text-muted" colspan="7">보유 중인 종목이 없습니다. 아래에서 새 포지션을 등록하세요.</td></tr>';
        totalRow.style.display = 'none';
        document.getElementById('positionDetailCard').style.display = 'none';
        document.getElementById('addEntryCard').style.display = 'none';
        document.getElementById('closeCard').style.display = 'none';
        document.getElementById('tradeGuidePanel').style.display = 'none';
        return;
    }

    const totalPnl = positions.reduce((sum, p) => sum + p.unrealized_pnl, 0);
    const pnlColor = totalPnl >= 0 ? 'text-success' : 'text-danger';
    badge.innerHTML = `${positions.length}개 보유 | <span class="${pnlColor}">${formatCurrency(totalPnl)}</span>`;

    tbody.innerHTML = positions.map(pos => {
        const dir = pos.direction === 'long' ? '<span class="text-success">매수</span>' : '<span class="text-danger">공매도</span>';
        const pc = pos.unrealized_pnl >= 0 ? 'text-success' : 'text-danger';
        const selected = pos.symbol === selectedPositionSymbol ? 'table-active' : '';
        return `<tr class="${selected}" onclick="onSelectPosition('${pos.symbol}')" style="cursor:pointer;">
            <td class="fw-bold">${pos.symbol}</td>
            <td>${dir}</td>
            <td>${pos.qty.toLocaleString()}</td>
            <td>${pos.entry_price.toLocaleString()}</td>
            <td>${pos.current_price ? pos.current_price.toLocaleString() : '--'}</td>
            <td class="${pc} fw-bold">${formatCurrency(pos.unrealized_pnl)} (${pos.unrealized_pnl_pct.toFixed(1)}%)</td>
            <td class="text-danger">${pos.active_stop > 0 ? pos.active_stop.toLocaleString() : '--'}</td>
        </tr>`;
    }).join('');

    totalRow.style.display = '';
    document.getElementById('totalPnl').innerHTML = `<span class="${pnlColor}">${formatCurrency(totalPnl)}</span>`;

    // 자동 선택: 현재 선택된 종목이 없거나 목록에 없으면 첫 번째 선택
    if (!selectedPositionSymbol || !positions.find(p => p.symbol === selectedPositionSymbol)) {
        selectedPositionSymbol = positions[0].symbol;
    }
    showPositionDetail(selectedPositionSymbol);
}

// ── 포지션 선택 & 상세 ───────────────────────────────────

function onSelectPosition(symbol) {
    selectedPositionSymbol = symbol;
    document.getElementById('entrySymbol').value = symbol;

    // 해당 종목 차트 로드 (현재 로드된 종목과 다르면)
    if (symbol !== currentSymbol) {
        selectTicker(symbol, '');
    } else {
        showPositionDetail(symbol);
        // 테이블 하이라이트 갱신
        document.querySelectorAll('#portfolioTableBody tr').forEach(tr => tr.classList.remove('table-active'));
        const rows = document.querySelectorAll('#portfolioTableBody tr');
        rows.forEach(tr => {
            if (tr.onclick && tr.textContent.includes(symbol)) tr.classList.add('table-active');
        });
    }
}

function showPositionDetail(symbol) {
    const positions = window._allPositions || [];
    const pos = positions.find(p => p.symbol === symbol);
    if (!pos) {
        document.getElementById('positionDetailCard').style.display = 'none';
        document.getElementById('addEntryCard').style.display = 'none';
        document.getElementById('closeCard').style.display = 'none';
        document.getElementById('tradeGuidePanel').style.display = 'none';
        return;
    }

    window._currentPosition = pos;

    // 상세 정보
    document.getElementById('positionDetailCard').style.display = '';
    document.getElementById('addEntryCard').style.display = '';
    document.getElementById('closeCard').style.display = '';

    const dir = pos.direction === 'long' ? '매수 (롱)' : '공매도 (숏)';
    const pnlColor = pos.unrealized_pnl >= 0 ? 'text-success' : 'text-danger';
    document.getElementById('detailSymbolTitle').textContent = `${symbol} 포지션 상세`;

    let fillsHtml = '';
    if (pos.fills && pos.fills.length > 0) {
        fillsHtml = '<div class="mt-2"><strong class="small">거래 이력:</strong><div class="list-group list-group-sm mt-1">' + pos.fills.map((f, idx) => {
            const t = f.type === 'entry' ? '진입' : f.type === 'pyramid' ? '피라미딩' : '물타기';
            const badgeBg = f.type === 'entry' ? 'bg-primary' : f.type === 'pyramid' ? 'bg-success' : 'bg-warning';
            return `<div class="list-group-item list-group-item-dark d-flex justify-content-between align-items-center py-1 px-2">
              <span class="small"><span class="badge ${badgeBg}">${t}</span> ${f.qty}주 @ ${f.price.toLocaleString()} KRW</span>
              <button type="button" class="btn btn-sm btn-outline-danger py-0 px-1" onclick="deleteFill('${symbol}', ${idx})" title="삭제"><i class="bi bi-trash"></i></button>
            </div>`;
        }).join('') + '</div></div>';
    }

    document.getElementById('positionDetailContent').innerHTML = `
        <table class="table table-sm table-dark mb-1 small">
            <tr><td>방향</td><td><span class="badge ${pos.direction === 'long' ? 'bg-success' : 'bg-danger'}">${dir}</span></td></tr>
            <tr><td>평균 단가</td><td class="fw-bold">${pos.entry_price.toLocaleString()}</td></tr>
            <tr><td>보유 수량</td><td>${pos.qty.toLocaleString()}주</td></tr>
            <tr><td>현재가</td><td>${pos.current_price ? pos.current_price.toLocaleString() : '--'}</td></tr>
            <tr><td>수익/손실</td><td class="${pnlColor} fw-bold">${formatCurrency(pos.unrealized_pnl)} (${pos.unrealized_pnl_pct.toFixed(2)}%)</td></tr>
            <tr><td>R 배수</td><td>${pos.r_multiple.toFixed(2)}</td></tr>
            <tr class="border-top"><td>초기 손절가</td><td class="text-danger">${pos.initial_stop > 0 ? pos.initial_stop.toLocaleString() : '--'}</td></tr>
            <tr><td><strong>현재 손절가</strong></td><td class="fw-bold text-danger">${pos.active_stop > 0 ? pos.active_stop.toLocaleString() : '--'}</td></tr>
            <tr><td>추적 손절</td><td class="text-warning">${pos.trailing_stop > 0 ? pos.trailing_stop.toLocaleString() : '미활성'}</td></tr>
            <tr><td>본전 보호</td><td class="text-info">${pos.breakeven_stop > 0 ? pos.breakeven_stop.toLocaleString() : '미활성'}</td></tr>
            <tr class="border-top"><td>피라미딩</td><td>${pos.pyramid_count}회</td></tr>
            <tr><td>물타기</td><td>${pos.avg_down_count}회</td></tr>
        </table>
        ${fillsHtml}
    `;

    // 매매 가이드
    showTradeGuide(pos);
}

function showTradeGuide(pos) {
    const panel = document.getElementById('tradeGuidePanel');
    const content = document.getElementById('tradeGuideContent');
    const title = document.getElementById('guideSymbolTitle');
    panel.style.display = '';
    title.textContent = `${pos.symbol} 매매 가이드`;

    const stopDist = Math.abs(pos.entry_price - pos.active_stop);
    const stopPct = pos.entry_price > 0 ? (stopDist / pos.entry_price * 100).toFixed(1) : 0;

    let guide = '';
    if (pos.unrealized_pnl_pct > 0) {
        if (pos.trailing_stop > 0) {
            guide = `<div class="alert alert-success py-2 mb-0 small">
                <strong>수익 중 — 추적 손절 활성</strong><br>
                현재 가격이 <strong>${pos.trailing_stop.toLocaleString()}</strong> 아래로 떨어지면 매도하세요.<br>
                수익을 보호하면서 추가 상승을 기다립니다.
            </div>`;
        } else if (pos.breakeven_stop > 0) {
            guide = `<div class="alert alert-info py-2 mb-0 small">
                <strong>수익 중 — 본전 보호 활성</strong><br>
                본전가 <strong>${pos.breakeven_stop.toLocaleString()}</strong> 아래로 안 내려가도록 걸려있습니다.
            </div>`;
        } else {
            guide = `<div class="alert alert-warning py-2 mb-0 small">
                <strong>수익 중 — 아직 보호 수준 미도달</strong><br>
                현재 손절가: <strong>${pos.active_stop.toLocaleString()}</strong> (진입가 대비 ${stopPct}% 거리)<br>
                더 오르면 자동으로 손절가가 올라갑니다.
            </div>`;
        }
    } else {
        guide = `<div class="alert alert-danger py-2 mb-0 small">
            <strong>손실 중 (${pos.unrealized_pnl_pct.toFixed(1)}%)</strong><br>
            현재 손절가: <strong>${pos.active_stop.toLocaleString()}</strong> (진입가 대비 ${stopPct}% 거리)<br>
            이 가격에 도달하면 손절하세요.
        </div>`;
    }
    content.innerHTML = guide;
}

// ── 차트 ─────────────────────────────────────────────────

function updateChart() {
    fetch('/api/chart').then(r => r.json()).then(chart => {
        const newJson = JSON.stringify({
            bc: chart.bars?.length, active: chart.active,
            sh: chart.stop_history?.length, ep: chart.entry_price,
            sym: chart.symbol,
        });
        if (newJson !== lastChartJson || !lastChartJson) {
            drawPriceChart(chart);
            lastChartJson = newJson;
        }
    }).catch(err => {
        console.error('Chart error:', err);
        lastChartJson = '';
    });
}

function drawPriceChart(chartData) {
    const ctx = document.getElementById('priceChart');
    if (priceChart) priceChart.destroy();

    const bars = chartData.bars || [];
    if (bars.length === 0) {
        priceChart = new Chart(ctx, {
            type: 'line', data: { labels: [], datasets: [] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
        return;
    }

    const labels = bars.map((b, i) => b.timestamp || `#${i}`);
    const closes = bars.map(b => b.close);

    const datasets = [{
        label: '종가',
        data: closes,
        borderColor: '#6ea8fe',
        backgroundColor: 'rgba(110,168,254,0.08)',
        fill: true,
        tension: 0.1,
        pointRadius: 0,
        borderWidth: 2,
    }];

    // 손절선 (현재 종목에 포지션이 있을 때만)
    if (chartData.active && chartData.stop_history?.length > 0) {
        const activeStops = new Array(bars.length).fill(null);
        chartData.stop_history.forEach(s => {
            if (s.bar < bars.length) activeStops[s.bar] = s.active || null;
        });
        for (let i = 1; i < bars.length; i++) {
            if (activeStops[i] === null && activeStops[i-1] !== null) activeStops[i] = activeStops[i-1];
        }
        datasets.push({
            label: '현재 손절가',
            data: activeStops,
            borderColor: '#ff6b6b',
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
            spanGaps: true,
        });
    }

    // 진입가 수평선
    if (chartData.entry_price > 0) {
        datasets.push({
            label: '평균 매수가',
            data: new Array(bars.length).fill(chartData.entry_price),
            borderColor: 'rgba(13,202,240,0.6)',
            borderWidth: 1,
            borderDash: [6, 3],
            pointRadius: 0,
            fill: false,
        });
    }

    priceChart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top', labels: { color: '#adb5bd', font: { size: 10 }, boxWidth: 12 } },
            },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6c757d', maxTicksLimit: 15, font: { size: 9 } } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#adb5bd' } },
            },
        }
    });
}

// ── 포지션 관리 ──────────────────────────────────────────

async function manualEntry() {
    const symbol = document.getElementById('entrySymbol').value.trim();
    const price = parseFloat(document.getElementById('entryPrice').value);
    const qty = parseFloat(document.getElementById('entryQty').value) || 0;
    const direction = document.getElementById('entryDirection').value;
    const entryDate = document.getElementById('entryDate').value;

    if (!symbol) { showToast('오류', '종목 코드를 입력하세요', 'warning'); return; }
    if (!price || price <= 0) { showToast('오류', '매수 가격을 입력하세요', 'warning'); return; }

    // 종목이 아직 로드되지 않았으면 먼저 로드
    if (symbol !== currentSymbol) {
        await selectTicker(symbol, '');
    }

    await fetchJson('/api/config', { position_direction: direction, entry_source: 'manual' });
    const res = await fetchJson('/api/entry', { symbol, price, qty, entry_date: entryDate || '' });
    if (res.error) {
        showToast('오류', res.error, 'danger');
    } else {
        showToast('등록 완료', `${symbol} ${price.toLocaleString()}에 ${direction === 'long' ? '매수' : '공매도'} 등록`, 'success');
        selectedPositionSymbol = symbol;
        loadAll();
    }
}

async function manualClose() {
    const symbol = selectedPositionSymbol || document.getElementById('entrySymbol').value.trim() || currentSymbol;
    const price = parseFloat(document.getElementById('closePrice').value) || 0;
    const qty = parseFloat(document.getElementById('closeQty').value) || 0;
    const position = window._currentPosition;
    
    let confirmMsg = `${symbol} `;
    if (qty > 0 && qty < position.qty) {
        confirmMsg += `${qty}주를 ${price > 0 ? price.toLocaleString() : '현재가'}에 매도하시겠습니까?`;
    } else {
        confirmMsg += `포지션을 ${price > 0 ? price.toLocaleString() : '현재가'}에 전량 매도하시겠습니까?`;
    }
    
    if (!confirm(confirmMsg)) return;
    const res = await fetchJson('/api/close', { symbol, price, qty });
    if (res.error) {
        showToast('오류', res.error, 'danger');
    } else {
        const s = res.summary;
        const typeStr = s.is_partial && s.remaining_qty > 0 ? `부분매도 (남은 수량: ${s.remaining_qty}주)` : '전량 매도';
        showToast('매도 완료',
            `${symbol} ${typeStr} | 손익: ${formatCurrency(s.pnl)} (${s.pnl_pct.toFixed(2)}%)`,
            s.pnl >= 0 ? 'success' : 'danger');
        document.getElementById('closePrice').value = '0';
        document.getElementById('closeQty').value = '0';
        selectedPositionSymbol = '';
        loadAll();
    }
}

async function manualAdd() {
    const symbol = selectedPositionSymbol || document.getElementById('entrySymbol').value.trim() || currentSymbol;
    const addDate = document.getElementById('addDate').value;
    const price = parseFloat(document.getElementById('addPrice').value);
    const qty = parseFloat(document.getElementById('addQty').value);
    const type = document.getElementById('addType').value;
    if (!price || !qty || price <= 0 || qty <= 0) {
        showToast('오류', '가격과 수량을 입력하세요', 'warning'); return;
    }
    const res = await fetchJson('/api/add', { symbol, price, qty, type, entry_date: addDate });
    if (res.error) {
        showToast('차단', res.error, 'warning');
    } else {
        showToast('추가 매수', `${type === 'pyramid' ? '피라미딩' : '물타기'} 완료`, 'success');
        document.getElementById('addPrice').value = '';
        document.getElementById('addQty').value = '';
        document.getElementById('addDate').value = '';
        loadAll();
    }
}

function updateAddTypeExpl() {
    const type = document.getElementById('addType').value;
    const priceInput = parseFloat(document.getElementById('addPrice').value) || 0;
    const explDiv = document.getElementById('typeExpl');

    if (window._currentPosition && priceInput > 0) {
        const pos = window._currentPosition;
        const avg = pos.entry_price;
        if (type === 'pyramid') {
            const ok = pos.direction === 'long' ? priceInput > avg : priceInput < avg;
            explDiv.innerHTML = ok
                ? `<span class="text-success">수익 방향 추가 매수 (유리)</span>`
                : `<span class="text-warning">이 가격은 피라미딩이 아닌 물타기입니다</span>`;
        } else {
            const ok = pos.direction === 'long' ? priceInput < avg : priceInput > avg;
            explDiv.innerHTML = ok
                ? `<span class="text-info">손실 방향 추가 매수 (리스크 증가)</span>`
                : `<span class="text-warning">이 가격은 물타기가 아닌 피라미딩입니다</span>`;
        }
    } else {
        explDiv.innerHTML = '';
    }
}

async function closeSelectedPosition() {
    if (!selectedPositionSymbol) return;
    const price = parseFloat(document.getElementById('closePrice').value) || 0;
    const qty = parseFloat(document.getElementById('closeQty').value) || 0;
    if (!confirm(`${selectedPositionSymbol} 포지션을 매도하시겠습니까?`)) return;
    const res = await fetchJson('/api/close', { symbol: selectedPositionSymbol, price, qty });
    if (res.error) { showToast('오류', res.error, 'danger'); return; }
    const s = res.summary;
    const typeStr = s.is_partial && s.remaining_qty > 0 ? `부분매도 (남은 수량: ${s.remaining_qty}주)` : '전량 매도';
    showToast('매도 완료', `${selectedPositionSymbol} ${typeStr} | 손익: ${formatCurrency(s.pnl)}`, s.pnl >= 0 ? 'success' : 'danger');
    document.getElementById('closePrice').value = '0';
    document.getElementById('closeQty').value = '0';
    selectedPositionSymbol = '';
    loadAll();
}

async function resetSelectedPosition() {
    if (!selectedPositionSymbol) return;
    if (!confirm(`${selectedPositionSymbol} 포지션을 리셋하시겠습니까?`)) return;
    await fetchJson('/api/reset', { symbol: selectedPositionSymbol });
    showToast('리셋', `${selectedPositionSymbol} 포지션이 리셋되었습니다`, 'info');
    selectedPositionSymbol = '';
    loadAll();
}

async function deleteFill(symbol, fillIndex) {
    const typeNames = ['진입', '피라미딩', '물타기'];
    const pos = window._allPositions?.find(p => p.symbol === symbol);
    if (!pos || !pos.fills || !pos.fills[fillIndex]) return;
    const fill = pos.fills[fillIndex];
    const typeStr = typeNames[Object.keys({entry:0, pyramid:1, avg_down:2})[fill.type] || 0];
    if (!confirm(`${typeStr} 기록을 삭제하시겠습니까?\n${fill.qty}주 @ ${fill.price.toLocaleString()} KRW`)) return;
    
    const res = await fetchJson('/api/delete-fill', { symbol, fill_index: fillIndex });
    if (res.error) { showToast('오류', res.error, 'danger'); return; }
    showToast('삭제 완료', `${typeStr} 기록이 삭제되었습니다\n${res.message}`, 'success');
    loadAll();
}

async function refreshAllPrices() {
    document.getElementById('portfolioSummaryBadge').innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>갱신 중...';
    try {
        // 현재 종목 차트도 새로고침
        if (currentSymbol) {
            await fetchJson('/api/ticker/refresh', {});
            lastChartJson = '';
        }
        const res = await fetchJson('/api/prices/refresh', {});
        showToast('갱신', `${res.count}개 종목 가격 업데이트`, 'info');
        loadAll();
    } catch (err) {
        showToast('오류', '가격 갱신 실패', 'danger');
    }
}

// ── 초기화 ────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
    // 대시보드에서 '거래 페이지로' 버튼으로 진입 시 ?symbol= 처리
    const urlSymbol = new URLSearchParams(window.location.search).get('symbol');
    if (urlSymbol) {
        selectTicker(urlSymbol, urlSymbol);
    } else {
        loadAll();
    }
});
setInterval(loadAll, 10000);
</script>
